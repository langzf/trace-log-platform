services:
  trace-log-platform:
    build:
      context: .
      dockerfile: Dockerfile
    image: trace-log-platform:latest
    container_name: trace-log-platform
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      AUTO_ANALYZE: "1"
      ANALYZE_INTERVAL_MS: "30000"
      ENABLE_SQLITE_AUDIT: "0"
      AUDIT_DB_PATH: /app/data/platform.db
      QUEUE_MAX_ATTEMPTS: "3"
      ENABLE_LOG_COLLECTOR_SCHEDULER: "1"
      LOG_COLLECTOR_TICK_INTERVAL_MS: "5000"
      OPENCLAW_INSTALL_SCRIPT: /app/scripts/openclaw/install_openclaw.sh
      OPENCLAW_INSTALL_METHOD: auto
      OPENCLAW_EXPECT_HEALTH: "0"
      OPENCLAW_CHECK_COMMAND: openclaw --version
      OPENCLAW_ENDPOINT: http://127.0.0.1:18789
      OPENCLAW_HEALTH_PATH: /health
      REPAIR_RECEIVER_BASE_URL: http://127.0.0.1:8788
    volumes:
      - trace_log_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  trace_log_data:
